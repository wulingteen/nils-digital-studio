name: Redirect GitHub Pages to Vercel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir -p _site/nils-digital-studio
          cat > _site/nils-digital-studio/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting to Nils Digital Studio...</title>
            <script>
              var path = window.location.pathname.replace('/nils-digital-studio', '');
              var hash = window.location.hash;
              window.location.replace('https://nils-digital-studio.vercel.app' + path + hash);
            </script>
            <meta http-equiv="refresh" content="0;url=https://nils-digital-studio.vercel.app/zh/">
          </head>
          <body>
            <p>Redirecting to <a href="https://nils-digital-studio.vercel.app/zh/">nils-digital-studio.vercel.app</a>...</p>
          </body>
          </html>
          EOF
          cp _site/nils-digital-studio/index.html _site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
