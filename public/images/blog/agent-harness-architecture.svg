<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#f7f2e8"/>

  <!-- ── Outer ring: Safety & Scale (orange) ── -->
  <circle cx="420" cy="310" r="270" fill="#f5c48a" stroke="#e8a840" stroke-width="1.5"/>

  <!-- ── Middle ring: Capabilities (green) ── -->
  <circle cx="420" cy="310" r="210" fill="#b8dfa0" stroke="#7ab870" stroke-width="1.5"/>

  <!-- ── Inner ring: Runtime (blue) ── -->
  <circle cx="420" cy="310" r="148" fill="#a8d0f0" stroke="#5a9fd0" stroke-width="1.5"/>

  <!-- ── Centre circle: LLM (purple) ── -->
  <circle cx="420" cy="310" r="78" fill="#d8b4e8" stroke="#9060b8" stroke-width="2"/>

  <!-- ════════ CENTRE — LLM ════════ -->
  <text x="420" y="298" text-anchor="middle" font-size="17" font-weight="700" fill="#4a1a70">LLM</text>
  <text x="420" y="316" text-anchor="middle" font-size="10.5" fill="#6a3a90">Stateless model</text>
  <!-- brain icon (simplified) -->
  <text x="420" y="337" text-anchor="middle" font-size="18" fill="#7a40a0">🧠</text>

  <!-- ════════ RUNTIME RING labels ════════ -->
  <!-- Orchestration Loop (left of centre) -->
  <text x="323" y="292" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Orchestration</text>
  <text x="323" y="304" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Loop</text>
  <text x="323" y="316" text-anchor="middle" font-size="18" fill="#1a3a60">↻</text>

  <!-- Output Parsing (top-right) -->
  <text x="490" y="268" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Output</text>
  <text x="490" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Parsing</text>

  <!-- Prompt Construction (bottom-right) -->
  <text x="490" y="358" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Prompt</text>
  <text x="490" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Construction</text>
  <text x="490" y="382" text-anchor="middle" font-size="14" fill="#1a3a60">✏️</text>

  <!-- Error Handling (bottom-left) -->
  <text x="356" y="370" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Error</text>
  <text x="356" y="382" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Handling</text>
  <text x="356" y="394" text-anchor="middle" font-size="14" fill="#1a3a60">⚠️</text>

  <!-- Memory (top-left) -->
  <text x="360" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Memory</text>
  <text x="360" y="272" text-anchor="middle" font-size="14" fill="#1a3a60">💾</text>

  <!-- State Management (bottom) -->
  <text x="420" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">State</text>
  <text x="420" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#1a3a60">Management</text>
  <text x="420" y="460" text-anchor="middle" font-size="14" fill="#1a3a60">🗂️</text>

  <!-- ════════ CAPABILITIES RING labels ════════ -->
  <!-- Tools (top-left) -->
  <text x="295" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Tools</text>
  <text x="295" y="222" text-anchor="middle" font-size="16" fill="#1a4a20">🔧</text>

  <!-- Subagent Orchestration (right) -->
  <text x="568" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Subagent</text>
  <text x="568" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Orchestration</text>
  <text x="568" y="323" text-anchor="middle" font-size="16" fill="#1a4a20">🔍</text>

  <!-- Verification Loops (top-right) -->
  <text x="545" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Verification</text>
  <text x="545" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Loops</text>

  <!-- Context Management (bottom-right) -->
  <text x="548" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Context</text>
  <text x="548" y="413" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Management</text>
  <text x="548" y="428" text-anchor="middle" font-size="16" fill="#1a4a20">📋</text>

  <!-- Guardrails left -->
  <text x="278" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Guardrails</text>
  <text x="278" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">&amp; Safety</text>
  <text x="278" y="388" text-anchor="middle" font-size="16" fill="#1a4a20">🛡️</text>

  <!-- Crimpt / Compaction bottom-left arc -->
  <text x="310" y="470" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Compaction</text>
  <text x="310" y="484" text-anchor="middle" font-size="11" font-weight="600" fill="#1a4a20">Loops</text>
  <text x="310" y="498" text-anchor="middle" font-size="14" fill="#1a4a20">✂️</text>

  <!-- ════════ OUTER RING labels ════════ -->
  <!-- TOP arc — Safety & Scale -->
  <path id="topArc" d="M 200,200 A 270,270 0 0,1 640,200" fill="none"/>
  <text font-size="16" font-weight="700" fill="#7a3a00" letter-spacing="2">
    <textPath href="#topArc" startOffset="20%">Safety &amp; Scale</textPath>
  </text>

  <!-- BOTTOM arc — Safety & Scale -->
  <path id="botArc" d="M 640,420 A 270,270 0 0,1 200,420" fill="none"/>
  <text font-size="16" font-weight="700" fill="#7a3a00" letter-spacing="2">
    <textPath href="#botArc" startOffset="20%">Safety &amp; Scale</textPath>
  </text>

  <!-- Outer ring corner labels -->
  <!-- Guardrails & Safety top-left -->
  <text x="196" y="248" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(-45 196 248)">Guardrails</text>
  <text x="213" y="265" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(-45 213 265)">&amp; Safety</text>

  <!-- Tool Scoping bottom-left -->
  <text x="198" y="388" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(45 198 388)">Tool</text>
  <text x="215" y="405" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(45 215 405)">Scoping</text>
  <text x="210" y="422" text-anchor="middle" font-size="13" fill="#7a3a00" transform="rotate(45 210 422)">✂️</text>

  <!-- Verification Loops top-right -->
  <text x="620" y="248" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(45 620 248)">Verification</text>
  <text x="603" y="265" text-anchor="middle" font-size="10.5" font-weight="600" fill="#7a3a00" transform="rotate(45 603 265)">Loops</text>

  <!-- ════════ OUTER ANNOTATIONS ════════ -->
  <!-- "User request enters here" top-left -->
  <line x1="190" y1="160" x2="235" y2="195" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="152" y="145" text-anchor="middle" font-size="11.5" fill="#333">User request</text>
  <text x="152" y="159" text-anchor="middle" font-size="11.5" fill="#333">enters here</text>

  <!-- "User request enters here" bottom-left -->
  <line x1="200" y1="452" x2="240" y2="420" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="152" y="445" text-anchor="middle" font-size="11.5" fill="#333">User request</text>
  <text x="152" y="459" text-anchor="middle" font-size="11.5" fill="#333">enters here</text>

  <!-- "Tool calls go out" top-right -->
  <line x1="640" y1="170" x2="600" y2="205" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="690" y="162" text-anchor="middle" font-size="11.5" fill="#333">Tool calls</text>
  <text x="690" y="176" text-anchor="middle" font-size="11.5" fill="#333">go out</text>

  <!-- "The loop keeps running" bottom-left outer -->
  <line x1="204" y1="475" x2="248" y2="475" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="120" y="490" text-anchor="middle" font-size="11.5" fill="#333">The loop</text>
  <text x="120" y="504" text-anchor="middle" font-size="11.5" fill="#333">keeps running</text>

  <!-- ════════ SPEECH BUBBLE ════════ -->
  <rect x="700" y="260" width="180" height="78" rx="12" ry="12" fill="white" stroke="#888" stroke-width="1.5"/>
  <!-- tail -->
  <polygon points="700,298 680,310 700,318" fill="white" stroke="#888" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="680" y1="310" x2="700" y2="300" stroke="white" stroke-width="2"/>
  <line x1="680" y1="310" x2="700" y2="317" stroke="white" stroke-width="2"/>
  <text x="790" y="283" text-anchor="middle" font-size="11" fill="#222">The harness is</text>
  <text x="790" y="299" text-anchor="middle" font-size="11" fill="#222">multi-layered,</text>
  <text x="790" y="315" text-anchor="middle" font-size="11" fill="#222">not a single</text>
  <text x="790" y="330" text-anchor="middle" font-size="11" fill="#222">wrapper.</text>

  <!-- stick figure -->
  <circle cx="810" cy="380" r="14" fill="none" stroke="#555" stroke-width="2"/>
  <line x1="810" y1="394" x2="810" y2="430" stroke="#555" stroke-width="2"/>
  <line x1="790" y1="408" x2="830" y2="408" stroke="#555" stroke-width="2"/>
  <line x1="810" y1="430" x2="795" y2="455" stroke="#555" stroke-width="2"/>
  <line x1="810" y1="430" x2="825" y2="455" stroke="#555" stroke-width="2"/>

  <!-- TITLE at bottom -->
  <text x="420" y="597" text-anchor="middle" font-size="13" font-weight="600" fill="#444">Agent Harness — Multi-Layered Architecture</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

</svg>
